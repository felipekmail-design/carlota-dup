const gp=()=>{try{return JSON.parse(localStorage.getItem('dup_p')||'[]');}catch{return[];}};
const sp=d=>localStorage.setItem('dup_p',JSON.stringify(d));
const gh=()=>{try{return JSON.parse(localStorage.getItem('dup_h')||'{}');}catch{return{};}};
const sh=d=>localStorage.setItem('dup_h',JSON.stringify(d));
function gss(id){try{return JSON.parse(localStorage.getItem('ss_'+id)||'[]');}catch{return[];}}
function sss(id,ss){localStorage.setItem('ss_'+id,JSON.stringify(ss));}
function addSess(id,data){const ss=gss(id);ss.unshift(data);if(ss.length>4)ss.pop();sss(id,ss);}

function buildHP(wid,exl){
  const ss=gss(wid);
  if(!ss.length)return`<div class="hp"><button class="hpb" type="button" onclick="toggleHP(this)"><span class="hlbl">📋 Últimas Sessões</span><span class="harr">▼</span></button><div class="hbd"><div class="noh">NENHUMA SESSÃO AINDA</div></div></div>`;
  const sh=ss.map((sess,si)=>{
    const er=sess.exercises.map((ex,ei)=>{
      if(!ex.sets.some(s=>s.kg||s.reps))return'';
      const sr=ex.sets.map((s,i)=>`<div class="hrd"><div class="hsn">${i+1}</div><div class="hv${s.kg?'':' e'}">${s.kg||'—'}</div><div class="hv${s.reps?'':' e'}">${s.reps||'—'}</div></div>`).join('');
      return`<div class="hex"><div class="hen">${exl[ei]?.nm||''}</div><div class="hsc"><div class="hcl">Sér</div><div class="hcl">KG</div><div class="hcl">Reps</div></div>${sr}${ex.obs?`<div class="hobs">${ex.obs}</div>`:''}</div>`;
    }).filter(Boolean).join('');
    return`<div style="margin-bottom:${si<ss.length-1?'18px':'0'}"><div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#10b981;text-transform:uppercase;margin-bottom:10px;font-weight:500;">${si===0?'🟢 ÚLTIMA SESSÃO':'SESSÃO -'+(si+1)} · ${sess.date}</div>${er||'<div class="noh">Sem cargas</div>'}</div>`;
  }).join('<hr style="border:none;border-top:1px solid #f0f0e8;margin:12px 0;">');
  return`<div class="hp"><button class="hpb" type="button" onclick="toggleHP(this)"><div><span class="hlbl">📋 Últimas Sessões</span><div class="hdt" style="margin-top:2px">${ss[0].date}</div></div><span class="harr">▼</span></button><div class="hbd">${sh}</div></div>`;
}
function toggleHP(b){const bd=b.nextElementSibling,ar=b.querySelector('.harr'),o=bd.classList.toggle('open');ar.textContent=o?'▲':'▼';}

let ec='';
function openModal(wi){
  const w=WK[wi],pg=document.querySelectorAll('.page')[wi];
  const dt=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
  const subj=`[CARLOTA DUP] ${w.title} — ${dt}`;
  let lines=[subj,`Zona: ${w.zl} | ${w.s}x${w.r} | Descanso: ${w.d}`,``];
  let hd=false;
  const sd={date:new Date().toLocaleDateString('pt-BR'),exercises:[]};
  pg.querySelectorAll('.ec').forEach((card,ci)=>{
    const ex=w.ex[ci],es={nm:ex.nm,sets:[],obs:''};let sl=[];
    card.querySelectorAll('.sr').forEach((row,si)=>{
      const kg=row.querySelectorAll('.inp')[0]?.value||'',rp=row.querySelectorAll('.inp')[1]?.value||'',ok=row.querySelector('.ob')?.classList.contains('dn')?'✓':'·';
      es.sets.push({kg,reps:rp,done:ok==='✓'});
      if(kg||rp){sl.push(`  S${si+1}: ${kg||'?'}kg × ${rp||'?'} reps ${ok}`);hd=true;}
    });
    const ob=card.querySelector('.obs')?.value||'';es.obs=ob;sd.exercises.push(es);
    if(sl.length||ob){lines.push(`${ex.n}. ${ex.nm}`);lines.push(...sl);if(ob)lines.push(`  Obs: ${ob}`);lines.push('');}
  });
  if(!hd){alert('Registre pelo menos uma carga antes de enviar.');return;}
  ec=lines.join('\n');
  addSess(w.id,sd);
  refreshHP(wi);
  document.getElementById('mdp').textContent=ec;
  document.getElementById('cpm').style.display='none';
  const to='felipekmail%40gmail.com',su=encodeURIComponent(subj),body=encodeURIComponent(ec);
  document.getElementById('gml').href=`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${su}&body=${body}`;
  document.getElementById('ov').classList.add('open');
}
function refreshHP(wi){const w=WK[wi],pg=document.querySelectorAll('.page')[wi],c=pg.querySelector('.hpc');if(c)c.innerHTML=buildHP(w.id,w.ex);}
function closeModal(e){if(!e||e.target===document.getElementById('ov'))document.getElementById('ov').classList.remove('open');}
async function copyContent(){
  const m=document.getElementById('cpm');
  try{await navigator.clipboard.writeText(ec);}
  catch{const t=document.createElement('textarea');t.value=ec;t.style.cssText='position:fixed;opacity:0;top:0;left:0;';document.body.appendChild(t);t.focus();t.select();try{document.execCommand('copy');}catch{}document.body.removeChild(t);}
  m.style.display='block';setTimeout(()=>{m.style.display='none';},3000);
}

// Charts - load async so they never block the app
let charts={};
function tryMkChart(id,labels,datasets){
  if(typeof Chart==='undefined')return;
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{font:{family:'DM Sans',size:11},color:'#888',boxWidth:12,padding:12}}},scales:{x:{grid:{color:'#f0f0e8'},ticks:{font:{family:'DM Mono',size:10},color:'#bbb'}},y:{grid:{color:'#f0f0e8'},ticks:{font:{family:'DM Mono',size:10},color:'#bbb'}}},elements:{point:{radius:5,hoverRadius:7},line:{tension:0.3}}}});
}
function loadChartJS(cb){
  if(typeof Chart!=='undefined'){cb();return;}
  const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
  s.onload=cb;s.onerror=()=>console.log('Chart.js não disponível');
  document.head.appendChild(s);
}

function renderProg(){
  const data=gp(),hrv=gh(),div=document.getElementById('pprog');if(!div)return;
  const first=data[0]||null,last=data[data.length-1]||null,EMPTY=!data.length;
  function delta(key,gd){if(!first||!last||first===last)return`<span class="kd n">—</span>`;const d=(parseFloat(last[key])-parseFloat(first[key])).toFixed(1),sign=d>0?'+':'',ig=gd?d<0:d>0;return`<span class="kd ${ig?'g':'r'}">${sign}${d} vs início</span>`;}
  const hv=parseFloat(hrv.hrv)||0,badge=hv>=60?['mx','🟢 INTENSIDADE MÁXIMA']:hv>=40?['nm','🟡 INTENSIDADE NORMAL']:['lw','🔴 REDUZIR INTENSIDADE'],labels=data.map(d=>d.week);
  div.innerHTML=`<div class="pt">EVOLUÇÃO</div><div class="ps">Ciclo DUP 4 Semanas</div>
  ${(hrv.hrv||hrv.hr||hrv.sleep)?`<div class="hvb"><div class="hvt">⚡ Check-in de Hoje</div><div class="hvg"><div class="hvi"><span class="hvv">${hrv.hrv||'—'}</span><div class="hvl">HRV ms</div></div><div class="hvi"><span class="hvv">${hrv.hr||'—'}</span><div class="hvl">FC Rep.</div></div><div class="hvi"><span class="hvv">${hrv.sleep||'—'}</span><div class="hvl">Sono h</div></div></div>${hv?`<div style="margin-top:10px"><span class="hvbg ${badge[0]}">${badge[1]}</span></div>`:''}</div>`:''}
  <div class="st">Check-in Semanal</div>
  <div class="cc"><div class="cit">📋 Bioimpedância</div>
    <div class="fr"><div class="fg"><div class="fl">Semana</div><select class="fi" id="ciw" style="-webkit-appearance:none"><option value="S1 · Adaptação">S1 — Adaptação</option><option value="S2 · Sobrecarga">S2 — Sobrecarga</option><option value="S3 · Pico">S3 — Pico</option><option value="S4 · Deload">S4 — Deload</option></select></div><div class="fg"><div class="fl">Peso (kg)</div><input class="fi" id="cip" type="number" inputmode="decimal" placeholder="70.6" step="0.1"></div></div>
    <div class="fr"><div class="fg"><div class="fl">% Gordura</div><input class="fi" id="cig" type="number" inputmode="decimal" placeholder="17.3" step="0.1"></div><div class="fg"><div class="fl">Massa Magra (kg)</div><input class="fi" id="cim" type="number" inputmode="decimal" placeholder="54.7" step="0.1"></div></div>
    <div class="fr"><div class="fg"><div class="fl">Massa Musc. Esq.</div><input class="fi" id="cimu" type="number" inputmode="decimal" placeholder="42.9" step="0.1"></div><div class="fg"><div class="fl">Gordura Visceral</div><input class="fi" id="civ" type="number" inputmode="decimal" placeholder="8.0" step="0.5"></div></div>
    <div class="fr one"><div class="fg"><div class="fl">Observação</div><input class="fi" id="cio" type="text" placeholder="Sensação geral, sono, aderência..."></div></div>
    <button class="sb" onclick="saveCI()">✓ SALVAR CHECK-IN</button><div class="sm" id="sm">✓ Salvo!</div>
  </div>
  <div class="st">Check-in Diário HRV</div>
  <div class="cc"><div class="cit">⚡ Apple Watch · Hoje</div>
    <div class="fr"><div class="fg"><div class="fl">HRV (ms)</div><input class="fi" id="hv" type="number" inputmode="decimal" placeholder="67" value="${hrv.hrv||''}"></div><div class="fg"><div class="fl">FC Rep. (bpm)</div><input class="fi" id="hhr" type="number" inputmode="numeric" placeholder="57" value="${hrv.hr||''}"></div></div>
    <div class="fr one"><div class="fg"><div class="fl">Sono (horas)</div><input class="fi" id="hsl" type="number" inputmode="decimal" placeholder="7.5" step="0.5" value="${hrv.sleep||''}"></div></div>
    <button class="sb pu" onclick="saveHRV()">✓ ATUALIZAR HRV</button>
  </div>
  ${EMPTY?`<div class="st">Gráficos</div><div class="chc"><div class="emp">📊<br><br>Registre o primeiro check-in para ver os gráficos.</div></div>`:`
  <div class="st">Métricas Atuais</div>
  <div class="kg"><div class="kc"><div class="kl">Peso</div><div class="kv">${last.p}<span style="font-size:14px;font-family:'DM Mono'"> kg</span></div>${delta('p',true)}</div><div class="kc"><div class="kl">% Gordura</div><div class="kv">${last.g}<span style="font-size:14px;font-family:'DM Mono'">%</span></div>${delta('g',true)}</div><div class="kc"><div class="kl">Massa Magra</div><div class="kv">${last.m}<span style="font-size:14px;font-family:'DM Mono'"> kg</span></div>${delta('m',false)}</div><div class="kc"><div class="kl">Massa Musc.</div><div class="kv">${last.mu}<span style="font-size:14px;font-family:'DM Mono'"> kg</span></div>${delta('mu',false)}</div></div>
  <div class="st">Gráficos</div>
  <div class="chc"><div class="cht">Peso Corporal (kg)</div><div class="chw"><canvas id="chp"></canvas></div></div>
  <div class="chc"><div class="cht">Gordura (%) vs Massa Magra (kg)</div><div class="chw"><canvas id="chc"></canvas></div></div>
  <div class="chc"><div class="cht">Massa Muscular Esquelética (kg)</div><div class="chw"><canvas id="chm"></canvas></div></div>`}
  <div class="st">Histórico</div>
  ${EMPTY?`<div class="chc"><div class="emp">📋<br><br>Nenhum registro ainda.</div></div>`:`
  <div class="hisc"><div class="hr hd"><div class="hcc lb">SEM</div><div class="hcc lb">PESO</div><div class="hcc lb">GORD</div><div class="hcc lb">MAGRA</div><div class="hcc lb"></div></div>
  ${data.map((d,i)=>`<div class="hr"><div class="hcc wk">${d.week.split('·')[0].trim()}</div><div class="hcc vl">${d.p}kg</div><div class="hcc vl">${d.g}%</div><div class="hcc vl">${d.m}kg</div><button class="db" onclick="delCI(${i})">✕</button></div>`).join('')}
  </div>`}`;
  if(!EMPTY){loadChartJS(()=>{setTimeout(()=>{
    tryMkChart('chp',labels,[{label:'Peso (kg)',data:data.map(d=>parseFloat(d.p)),borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,0.1)',fill:true,borderWidth:2}]);
    tryMkChart('chc',labels,[{label:'Gordura (%)',data:data.map(d=>parseFloat(d.g)),borderColor:'#f59e0b',fill:false,borderWidth:2},{label:'Massa Magra (kg)',data:data.map(d=>parseFloat(d.m)),borderColor:'#10b981',fill:false,borderWidth:2}]);
    tryMkChart('chm',labels,[{label:'Massa Muscular (kg)',data:data.map(d=>parseFloat(d.mu)),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,0.1)',fill:true,borderWidth:2}]);
  },100);});}
}
function saveCI(){
  const week=document.getElementById('ciw').value,p=document.getElementById('cip').value,g=document.getElementById('cig').value;
  if(!p||!g){alert('Preencha Peso e % Gordura.');return;}
  const data=gp(),entry={week,p,g,m:document.getElementById('cim').value||0,mu:document.getElementById('cimu').value||0,v:document.getElementById('civ').value||0,o:document.getElementById('cio').value,date:new Date().toLocaleDateString('pt-BR')};
  const idx=data.findIndex(d=>d.week===week);if(idx>=0)data[idx]=entry;else data.push(entry);sp(data);
  const msg=document.getElementById('sm');msg.style.display='block';setTimeout(()=>{msg.style.display='none';renderProg();},1200);
}
function saveHRV(){sh({hrv:document.getElementById('hv').value,hr:document.getElementById('hhr').value,sleep:document.getElementById('hsl').value});renderProg();}
function delCI(i){if(!confirm('Remover?'))return;const d=gp();d.splice(i,1);sp(d);renderProg();}

function setZC(zc){document.documentElement.style.setProperty('--zc',zc);}
function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===idx));
  if(idx<WK.length)setZC(WK[idx].zc);else{setZC('#10b981');renderProg();}
}

(function build(){
  const te=document.getElementById('tabs'),pe=document.getElementById('pages');
  WK.forEach((w,wi)=>{
    const tb=document.createElement('button');tb.className='tab'+(wi===0?' active':'');tb.textContent=w.label;tb.onclick=()=>switchTab(wi);te.appendChild(tb);
    const pg=document.createElement('div');pg.className='page'+(wi===0?' active':'');
    const exH=w.ex.map(ex=>{
      const cls=ex.a?'al':ex.p?'pr':'';let rows='';
      for(let i=0;i<ex.s;i++)rows+=`<div class="sr"><div class="sn">${i+1}</div><input class="inp" type="number" inputmode="decimal" placeholder="—"><input class="inp" type="number" inputmode="numeric" placeholder="${ex.r}"><button class="ob" type="button">○</button></div>`;
      return`<div class="ec ${cls}"><button class="etb" type="button"><div class="etp"><div style="flex:1"><span class="en" data-base="EX ${ex.n}">EX ${ex.n}</span><span class="enm">${ex.nm}</span><div class="chs"><span class="ch z">${ex.s}×${ex.r}</span><span class="ch">⏱ ${ex.d}</span></div></div><div class="aw">▼</div></div>${ex.no?`<span class="eno">${ex.no}</span>`:''}${ex.a?`<div class="ar">⚠️ ${ex.a}</div>`:''}</button><div class="lb"><div class="lc"><div class="clh">Sér</div><div class="clh">KG</div><div class="clh">Reps</div><div class="clh">OK</div></div>${rows}<textarea class="obs" placeholder="Observações..."></textarea><button class="cb" type="button">↺ LIMPAR</button></div></div>`;
    }).join('');
    pg.innerHTML=`<div class="wt">${w.title}</div><div class="ws">${w.sub}</div><div class="zb">${w.zl}</div><div class="stats"><div class="stat"><span class="sv">${w.s}</span><div class="sl">Séries</div></div><div class="stat"><span class="sv">${w.r}</span><div class="sl">Reps</div></div><div class="stat"><span class="sv">${w.d}</span><div class="sl">Descanso</div></div></div><div class="st">Referência · Sessões Anteriores</div><div class="hpc">${buildHP(w.id,w.ex)}</div><div class="st">Exercícios · Toque para registrar</div><div class="exl">${exH}</div><div class="sw"><button class="sndb" type="button" onclick="openModal(${wi})">📤 Salvar + Enviar para a Carlota</button><div class="sno">Salva no histórico local e abre o Gmail.</div></div><div class="st">Embasamento Científico</div><div class="scb"><div class="scl">📚 Referência</div><div class="sct">${w.ref}</div></div><div class="st">Dica da Sessão</div><div class="tpb"><div class="tpl">💡 Carlota DUP</div><div class="tpt">${w.tip}</div></div>`;
    pe.appendChild(pg);
    pg.querySelectorAll('.etb').forEach(btn=>{btn.addEventListener('click',function(){const lb=this.nextElementSibling,ar=this.querySelector('.aw'),o=lb.classList.toggle('open');ar.textContent=o?'▲':'▼';});});
    pg.querySelectorAll('.ob').forEach(btn=>{btn.addEventListener('click',function(){this.classList.toggle('dn');this.textContent=this.classList.contains('dn')?'✓':'○';this.closest('.sr').querySelectorAll('.inp').forEach(i=>i.classList.toggle('fd',this.classList.contains('dn')));const card=this.closest('.ec'),total=card.querySelectorAll('.ob').length,done=card.querySelectorAll('.ob.dn').length,el=card.querySelector('.en');el.textContent=done===0?el.dataset.base:done===total?el.dataset.base+' ✓':el.dataset.base+` · ${done}/${total}`;});});
    pg.querySelectorAll('.cb').forEach(btn=>{btn.addEventListener('click',function(){const card=this.closest('.ec');card.querySelectorAll('.inp').forEach(i=>{i.value='';i.classList.remove('fd');});card.querySelectorAll('.ob').forEach(b=>{b.classList.remove('dn');b.textContent='○';});card.querySelector('.obs').value='';const el=card.querySelector('.en');el.textContent=el.dataset.base;});});
  });
  const pt=document.createElement('button');pt.className='tab ptab';pt.textContent='📊 Progresso';pt.onclick=()=>switchTab(WK.length);te.appendChild(pt);
  const pp=document.createElement('div');pp.className='page';pp.id='pprog';pe.appendChild(pp);
  setZC(WK[0].zc);
})();
