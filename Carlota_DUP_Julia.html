function gp(){try{var v=localStorage.getItem(‘jrv_p’);return v?JSON.parse(v):[];}catch(e){return[];}}
function sp(d){try{localStorage.setItem(‘jrv_p’,JSON.stringify(d));}catch(e){}}
function gh(){try{var v=localStorage.getItem(‘jrv_h’);return v?JSON.parse(v):{};}catch(e){return{};}}
function sh(d){try{localStorage.setItem(‘jrv_h’,JSON.stringify(d));}catch(e){}}
function gss(id){try{var v=localStorage.getItem(‘jrv_s_’+id);return v?JSON.parse(v):[];}catch(e){return[];}}
function sss(id,arr){try{localStorage.setItem(‘jrv_s_’+id,JSON.stringify(arr));}catch(e){}}
function addSess(id,data){var ss=gss(id);ss.unshift(data);if(ss.length>4)ss.pop();sss(id,ss);}

function buildHP(wid,exl){
var ss=gss(wid);
if(!ss.length){
return ‘<div class="hp"><button class="hpb" onclick="toggleHP(this)"><span class="hlbl">Ultimas Sessoes</span><span class="harr">v</span></button><div class="hbd"><div class="noh">NENHUMA SESSAO AINDA</div></div></div>’;
}
var inner=’’;
for(var si=0;si<ss.length;si++){
var sess=ss[si];
var label=si===0?‘ULTIMA SESSAO’:‘SESSAO -’+(si+1);
var exRows=’’;
for(var ei=0;ei<sess.exercises.length;ei++){
var ex=sess.exercises[ei];
var hasSets=false;
for(var k=0;k<ex.sets.length;k++){if(ex.sets[k].kg||ex.sets[k].reps){hasSets=true;break;}}
if(!hasSets)continue;
var setRows=’’;
for(var k=0;k<ex.sets.length;k++){
var s=ex.sets[k];
setRows+=’<div class="hrd"><div class="hsn">’+(k+1)+’</div><div class="hv'+(s.kg?'':' hve')+'">’+( s.kg||’-’)+’</div><div class="hv'+(s.reps?'':' hve')+'">’+(s.reps||’-’)+’</div></div>’;
}
exRows+=’<div class="hex"><div class="hen">’+(exl[ei]?exl[ei].nm:’’)+’</div><div class="hsc"><div class="hcl">Ser</div><div class="hcl">KG</div><div class="hcl">Reps</div></div>’+setRows+(ex.obs?’<div class="hobs">’+ex.obs+’</div>’:’’)+’</div>’;
}
if(si>0)inner+=’<hr style="border:none;border-top:1px solid #f0f0e8;margin:12px 0;">’;
inner+=’<div style="font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:2px;color:#10b981;text-transform:uppercase;margin-bottom:10px;font-weight:500;">’+label+’ · ‘+sess.date+’</div>’+(exRows||’<div class="noh">Sem cargas</div>’);
}
return ‘<div class="hp"><button class="hpb" onclick="toggleHP(this)"><div><span class="hlbl">Ultimas Sessoes</span><div class="hdt">’+ss[0].date+’</div></div><span class="harr">v</span></button><div class="hbd">’+inner+’</div></div>’;
}

function saveOnly(wi){
var w=WK[wi];
var pages=document.querySelectorAll(’.page’);
var pg=pages[wi];
var sd={date:new Date().toLocaleDateString(‘pt-BR’),exercises:[]};
var hasData=false;
var cards=pg.querySelectorAll(’.ec’);
for(var ci=0;ci<cards.length;ci++){
var card=cards[ci];
var ex=w.ex[ci];
var es={nm:ex?ex.nm:’’,sets:[],obs:’’};
var rows=card.querySelectorAll(’.sr’);
for(var ri=0;ri<rows.length;ri++){
var row=rows[ri];
var inputs=row.querySelectorAll(’.inp’);
var kg=inputs[0]?inputs[0].value:’’;
var reps=inputs[1]?inputs[1].value:’’;
var done=row.querySelector(’.ob’)?row.querySelector(’.ob’).classList.contains(‘dn’):false;
es.sets.push({kg:kg,reps:reps,done:done});
if(kg||reps)hasData=true;
}
var obsEl=card.querySelector(’.obs’);
es.obs=obsEl?obsEl.value:’’;
sd.exercises.push(es);
}
if(!hasData){alert(‘Registre pelo menos uma carga antes de salvar.’);return;}
addSess(w.id,sd);
var hpc=pg.querySelector(’.hpc’);
if(hpc)hpc.innerHTML=buildHP(w.id,w.ex);
var hbd=pg.querySelector(’.hbd’);
var hpb=pg.querySelector(’.hpb’);
if(hbd&&!hbd.classList.contains(‘open’)){
hbd.classList.add(‘open’);
if(hpb){var arr=hpb.querySelector(’.harr’);if(arr)arr.textContent=’^’;}
}
showToast();
}
